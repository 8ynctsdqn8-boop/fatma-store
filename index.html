<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#f6f6f6;
}

/* هيدر */
.header{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* المنتجات */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.price{
    color:green;
    font-weight:bold;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#111;
    color:white;
    border:0;
    cursor:pointer;
}

/* السلة */
.cart{
    position:fixed;
    left:15px;
    top:15px;
    background:red;
    color:white;
    width:28px;
    height:28px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* زر الطلب */
.orderBtn{
    margin:15px;
    padding:12px;
    background:#25D366;
    color:white;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div>🛍️ Store</div>
<div class="cart" id="cartCount">0</div>
</div>

<div class="orderBtn" onclick="sendOrder()">
📲 اطلب الآن
</div>

<!-- المنتجات (صورك فقط بدون أسماء ألوان) -->

<div class="products">

<div class="card">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/0879101f-bb8a-4f82-a55e-ac3d2f732634.jpeg">
<div class="info">
<div class="price">800 جنيه</div>
</div>
<button onclick="add('منتج 1',800)">أضف للسلة</button>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/340e5cab-4e21-41c9-8c52-d812829ebf2c.jpeg">
<div class="info">
<div class="price">650 جنيه</div>
</div>
<button onclick="add('منتج 2',650)">أضف للسلة</button>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/5fa57c2d-52c3-4528-b68f-19456893ded0.jpeg">
<div class="info">
<div class="price">780 جنيه</div>
</div>
<button onclick="add('منتج 3',780)">أضف للسلة</button>
</div>

<div class="card">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/72b7b607-5592-4a6a-9d38-c9445a0dbf43.jpeg">
<div class="info">
<div class="price">500 جنيه</div>
</div>
<button onclick="add('منتج 4',500)">أضف للسلة</button>
</div>

</div>

<script>

let cart = [];

function add(name, price){
    cart.push({name, price});
    document.getElementById("cartCount").innerText = cart.length;
}

function sendOrder(){

    if(cart.length === 0){
        alert("السلة فاضية");
        return;
    }

    let msg = "🛍️ طلب جديد%0A%0A";

    cart.forEach((item,i)=>{
        msg += (i+1)+"- "+item.name+" "+item.price+" جنيه%0A";
    });

    window.open("https://wa.me/201224537445?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
