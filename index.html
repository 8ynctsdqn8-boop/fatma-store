<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#fff;
}

/* هيدر بسيط زي SHEIN */
.header{
    background:white;
    border-bottom:1px solid #eee;
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
}

/* شبكة منتجات صغيرة */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card{
    background:white;
    border-radius:8px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:8px;
}

/* السعر */
.price{
    color:#111;
    font-weight:bold;
    font-size:14px;
    margin-top:5px;
}

/* زر صغير زي التطبيقات */
button{
    width:100%;
    padding:8px;
    border:0;
    background:black;
    color:white;
    font-size:13px;
    border-radius:6px;
}

/* سلة */
.cartBtn{
    background:black;
    color:white;
    padding:6px 10px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
}

.cart{
    position:fixed;
    left:-340px;
    top:0;
    width:300px;
    height:100%;
    background:white;
    box-shadow:2px 0 10px rgba(0,0,0,0.2);
    padding:15px;
    transition:0.3s;
    overflow:auto;
}

.cart.open{
    left:0;
}

.item{
    border-bottom:1px solid #eee;
    padding:8px 0;
    font-size:14px;
}

.orderBtn{
    width:100%;
    padding:10px;
    background:#25D366;
    color:white;
    border:0;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<div>STORE</div>
<div class="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</div>

<div class="grid" id="grid"></div>

<!-- السلة -->
<div class="cart" id="cart">

<h3>🛒 السلة</h3>
<div id="items"></div>

<button class="orderBtn" onclick="send()">اطلب الآن</button>

</div>

<script>

let cart = [];

/* المنتجات */
let products = [
{img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/0879101f-bb8a-4f82-a55e-ac3d2f732634.jpeg",price:800},
{img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/340e5cab-4e21-41c9-8c52-d812829ebf2c.jpeg",price:650},
{img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/5fa57c2d-52c3-4528-b68f-19456893ded0.jpeg",price:780},
{img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/72b7b607-5592-4a6a-9d38-c9445a0dbf43.jpeg",price:500},
{img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/8bef95ba-3966-4361-878d-9fddb981a4b4.jpeg",price:600},
{img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/9214c5b0-4ef3-420b-afcd-add97dab3c98.jpeg",price:700}
];

function render(){

    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="card">
        <img src="${p.img}">
        <div class="price">${p.price} جنيه</div>
        <button onclick="add(${i})">إضافة</button>
        </div>
        `;
    });

    document.getElementById("grid").innerHTML = html;
}

function add(i){
    cart.push(products[i]);
    document.getElementById("count").innerText = cart.length;
    updateCart();
}

function updateCart(){

    let html = "";

    cart.forEach((c,i)=>{
        html += `<div class="item">${i+1}- ${c.price} جنيه</div>`;
    });

    document.getElementById("items").innerHTML = html;
}

function toggleCart(){
    document.getElementById("cart").classList.toggle("open");
}

function send(){

    let msg = "🛍️ طلب جديد%0A%0A";

    cart.forEach((c,i)=>{
        msg += (i+1)+"- "+c.price+" جنيه%0A";
    });

    window.open("https://wa.me/201224537445?text=" + encodeURIComponent(msg));
}

render();

</script>

</body>
</html>
