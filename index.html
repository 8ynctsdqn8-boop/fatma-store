<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fatma Store</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    margin:0;
    background:#f4f4f4;
}

.header{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    position:relative;
}

.cart{
    position:absolute;
    left:15px;
    top:15px;
    background:red;
    color:white;
    width:25px;
    height:25px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    padding:15px;
}

.product{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
    position:relative;
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
}

/* الأسعار */
.price{
    padding:8px;
}

.old{
    text-decoration:line-through;
    color:gray;
    font-size:14px;
}

.new{
    color:green;
    font-size:18px;
    font-weight:bold;
}

/* الخصم */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    color:white;
    padding:5px 8px;
    font-size:12px;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    border:0;
    background:#111;
    color:white;
    cursor:pointer;
}

.orderBtn{
    display:block;
    margin:15px;
    padding:12px;
    background:#25D366;
    color:white;
    text-align:center;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
🛍️ Fatma Store
<div class="cart" id="cartCount">0</div>
</div>

<a class="orderBtn" onclick="sendOrder()">📲 اطلب الآن</a>

<div class="products">

<!-- 1000 -> 800 -->
<div class="product">
<div class="badge">خصم 20%</div>
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/0879101f-bb8a-4f82-a55e-ac3d2f732634.jpeg">
<div class="price">
<div class="old">1000 جنيه</div>
<div class="new">800 جنيه</div>
</div>
<button onclick="add('منتج 1000 → 800')">أضف للسلة</button>
</div>

<!-- 800 -> 650 -->
<div class="product">
<div class="badge">خصم</div>
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/340e5cab-4e21-41c9-8c52-d812829ebf2c.jpeg">
<div class="price">
<div class="old">800 جنيه</div>
<div class="new">650 جنيه</div>
</div>
<button onclick="add('منتج 800 → 650')">أضف للسلة</button>
</div>

<!-- 780 -->
<div class="product">
<div class="badge">عرض</div>
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/5fa57c2d-52c3-4528-b68f-19456893ded0.jpeg">
<div class="price">
<div class="old">900 جنيه</div>
<div class="new">780 جنيه</div>
</div>
<button onclick="add('منتج 900 → 780')">أضف للسلة</button>
</div>

<!-- 600 -->
<div class="product">
<div class="badge">عرض</div>
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/72b7b607-5592-4a6a-9d38-c9445a0dbf43.jpeg">
<div class="price">
<div class="old">600 جنيه</div>
<div class="new">500 جنيه</div>
</div>
<button onclick="add('منتج 600 → 500')">أضف للسلة</button>
</div>

<!-- 500 -->
<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/8bef95ba-3966-4361-878d-9fddb981a4b4.jpeg">
<div class="price">
<div class="new">500 جنيه</div>
</div>
<button onclick="add('منتج 500')">أضف للسلة</button>
</div>

<!-- 400 -->
<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/9214c5b0-4ef3-420b-afcd-add97dab3c98.jpeg">
<div class="price">
<div class="new">400 جنيه</div>
</div>
<button onclick="add('منتج 400')">أضف للسلة</button>
</div>

</div>

<script>

let cart = [];

function add(item){
    cart.push(item);
    document.getElementById("cartCount").innerText = cart.length;
}

function sendOrder(){

    if(cart.length === 0){
        alert("السلة فاضية 🛒");
        return;
    }

    let msg = "🛍️ طلب جديد%0A%0A📦 المنتجات:%0A";

    cart.forEach((item,i)=>{
        msg += (i+1) + "- " + item + "%0A";
    });

    window.open("https://wa.me/201224537445?text=" + msg);
}

</script>

</body>
</html>
