<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#f5f5f5;
}

/* الهيدر */
.header{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* layout */
.container{
    display:flex;
}

/* لوحة التحكم */
.admin{
    width:300px;
    background:white;
    padding:15px;
    height:100vh;
    box-shadow:2px 0 10px rgba(0,0,0,0.1);
}

.admin input{
    width:100%;
    padding:10px;
    margin:5px 0;
}

.admin button{
    width:100%;
    padding:10px;
    background:#111;
    color:white;
    border:0;
    cursor:pointer;
}

/* المنتجات */
.products{
    flex:1;
    padding:15px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.info{
    padding:10px;
}

.price{
    color:green;
    font-weight:bold;
}

button.add{
    width:100%;
    padding:10px;
    border:0;
    background:#111;
    color:white;
}
</style>

</head>

<body>

<div class="header">
<div>🛍️ Admin Store</div>
<div>لوحة التحكم</div>
</div>

<div class="container">

<!-- لوحة التحكم -->
<div class="admin">

<h3>➕ إضافة منتج</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="img" placeholder="رابط الصورة">

<button onclick="addProduct()">إضافة</button>

<hr>

<h3>🛒 السلة</h3>
<div id="cartBox"></div>

<button onclick="sendOrder()" style="background:#25D366;margin-top:10px;">
📲 إرسال الطلب
</button>

</div>

<!-- المنتجات -->
<div class="products" id="products"></div>

</div>

<script>

let products = [];
let cart = [];

/* إضافة منتج من الأدمن */
function addProduct(){

    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let img = document.getElementById("img").value;

    products.push({name, price, img});

    render();
}

/* عرض المنتجات */
function render(){

    let html = "";

    products.forEach((p,i)=>{
        html += `
        <div class="card">
        <img src="${p.img}">
        <div class="info">
        <p>${p.name}</p>
        <div class="price">${p.price} جنيه</div>
        </div>
        <button class="add" onclick="addToCart(${i})">إضافة للسلة</button>
        </div>
        `;
    });

    document.getElementById("products").innerHTML = html;
}

/* إضافة للسلة */
function addToCart(i){
    cart.push(products[i]);
    updateCart();
}

/* عرض السلة */
function updateCart(){

    let html = "";

    cart.forEach((c,i)=>{
        html += `<div>${i+1}- ${c.name} ${c.price} جنيه</div>`;
    });

    document.getElementById("cartBox").innerHTML = html;
}

/* إرسال واتساب */
function sendOrder(){

    let msg = "🛍️ طلب جديد%0A%0A";

    cart.forEach((c,i)=>{
        msg += (i+1)+"- "+c.name+" "+c.price+" جنيه%0A";
    });

    window.open("https://wa.me/201224537445?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
