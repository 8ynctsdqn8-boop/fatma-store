<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاطمة الزهراء للمفروشات</title>

<style>

:root{
--main:#6A11CB;
--second:#2575FC;
--price:#E74C3C;
--bg:#F5F7FB;
--green:#25D366;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

/* الهيدر */
.header{
background:linear-gradient(135deg,var(--main),var(--second));
color:white;
text-align:center;
padding:20px;
position:sticky;
top:0;
}

.cart-btn{
position:absolute;
left:15px;
top:15px;
background:white;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* الكتالوج */
.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* الكارت */
.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* الصور موحدة وفخمة */
.card img{
width:100%;
height:200px;
object-fit:cover;
filter:saturate(0.85) contrast(1.05) brightness(0.95);
transition:0.4s;
}

.card:hover img{
transform:scale(1.05);
filter:saturate(1.1) contrast(1.1) brightness(1);
}

/* النصوص */
.card h2{
font-size:17px;
margin:10px;
}

.price{
color:var(--price);
font-weight:bold;
margin:0 10px;
}

/* زر */
.btn{
display:block;
text-align:center;
background:var(--second);
color:white;
padding:10px;
margin:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

.whatsapp{
background:var(--green);
}

/* السلة */
.cart-box{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
}

.cart-content{
background:white;
width:90%;
max-width:420px;
margin:40px auto;
padding:15px;
border-radius:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:6px 0;
border-bottom:1px solid #eee;
padding:5px;
}

.remove{
color:red;
cursor:pointer;
}

.title{
text-align:center;
margin:20px 0 0 0;
}

</style>
</head>

<body>

<div class="header">
<h1>🛏️ فاطمة الزهراء للمفروشات</h1>
<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>
</div>

<h2 class="title">🧺 كتالوج المفروشات</h2>

<div class="container">

<!-- 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800">
<h2>طقم عرايس أبيض</h2>
<p class="price">750 جنيه</p>
<button class="btn" onclick="add('أبيض - 750')">أضف</button>
</div>

<!-- 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1567016432779-094069958ea5?auto=format&fit=crop&w=800">
<h2>طقم بيج ناعم</h2>
<p class="price">700 جنيه</p>
<button class="btn" onclick="add('بيج - 700')">أضف</button>
</div>

<!-- 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1505691723518-36a5ac3b2d5a?auto=format&fit=crop&w=800">
<h2>طقم فاخر ملكي</h2>
<p class="price">900 جنيه</p>
<button class="btn" onclick="add('فاخر - 900')">أضف</button>
</div>

<!-- 4 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1582582429416-6a5c7b3c2c8f?auto=format&fit=crop&w=800">
<h2>طقم أطفال ملون</h2>
<p class="price">500 جنيه</p>
<button class="btn" onclick="add('أطفال - 500')">أضف</button>
</div>

<!-- 5 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed?auto=format&fit=crop&w=800">
<h2>طقم وردي ناعم</h2>
<p class="price">650 جنيه</p>
<button class="btn" onclick="add('وردي - 650')">أضف</button>
</div>

</div>

<!-- السلة -->
<div class="cart-box" id="cartBox">
<div class="cart-content">

<h3>🛒 السلة</h3>
<div id="cartList"></div>

<button class="btn whatsapp" onclick="order()">واتساب</button>
<button class="btn" onclick="clearCart()" style="background:red;">تفريغ</button>
<button class="btn" onclick="toggleCart()" style="background:#333;">إغلاق</button>

</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function add(item){
cart.push(item);
localStorage.setItem("cart", JSON.stringify(cart));
render();
alert("تمت الإضافة ✔️");
}

function render(){
document.getElementById("count").innerText = cart.length;

let box=document.getElementById("cartList");
box.innerHTML="";

cart.forEach((i,index)=>{
box.innerHTML+=`
<div class="cart-item">
<span>${i}</span>
<span class="remove" onclick="removeItem(${index})">❌</span>
</div>`;
});
}

function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart", JSON.stringify(cart));
render();
}

function toggleCart(){
let box=document.getElementById("cartBox");
box.style.display = box.style.display==="block"?"none":"block";
render();
}

function clearCart(){
cart=[];
localStorage.setItem("cart", JSON.stringify(cart));
render();
}

function order(){
let msg="طلب جديد:%0A"+cart.join("%0A");
window.open("https://wa.me/201224537445?text="+msg);
}

render();

</script>

</body>
</html>
