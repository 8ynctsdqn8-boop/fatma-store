<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاطمة الزهراء للمفروشات</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fb;}

.header{
background:linear-gradient(135deg,#6A11CB,#2575FC);
color:white;
text-align:center;
padding:20px;
position:sticky;
top:0;
}

/* شريط عرض */
.offer{
background:#E74C3C;
color:white;
text-align:center;
padding:8px;
font-size:14px;
}

/* زر واتساب ثابت */
.whatsapp-fixed{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 15px;
border-radius:50px;
font-size:18px;
text-decoration:none;
}

/* المنتجات */
.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.price{color:#E74C3C;font-weight:bold;margin:10px;}

.old-price{
text-decoration:line-through;
color:#999;
font-size:14px;
margin-right:5px;
}

.btn{
margin:10px;
padding:10px;
background:#2575FC;
color:white;
border:none;
border-radius:10px;
width:90%;
font-weight:bold;
}
</style>
</head>

<body>

<div class="offer">
🔥 عرض اليوم: خصم 20% + شحن مجاني 🔥
</div>

<div class="header">
🛏️ فاطمة الزهراء للمفروشات
</div>

<div class="container">

<div class="card">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/340e5cab-4e21-41c9-8c52-d812829ebf2c.jpeg">
<h3 style="margin:10px;">طقم ملاية فاخر</h3>

<p class="price">
<span class="old-price">800</span>
650 جنيه
</p>

<button class="btn" onclick="order('طقم ملاية فاخر - 650')">
اطلب الآن 🔥
</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505691723518-36a5ac3b2d5a">
<h3 style="margin:10px;">طقم عرايس</h3>

<p class="price">
<span class="old-price">1100</span>
900 جنيه
</p>

<button class="btn" onclick="order('طقم عرايس - 900')">
اطلب الآن 🔥
</button>
</div>

</div>

<!-- زر واتساب ثابت -->
<a class="whatsapp-fixed" 
href="https://wa.me/201224537445?text=عايزة%20استفسر" target="_blank">
💬
</a>

<script>
function order(product){
let msg =
"🛍️ طلب جديد%0A%0A" +
"📦 المنتج: " + product + "%0A" +
"🔥 من عرض اليوم";

window.open("https://wa.me/201224537445?text="+msg);
}
</script>

</body>
</html>
