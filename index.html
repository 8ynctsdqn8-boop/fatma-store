<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    direction: rtl;
    background:#f7f7f7;
}

/* هيدر */
.header{
    background:#111;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* المنتجات */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
    padding:15px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    height:240px;
    object-fit:cover;
}

/* الأسعار */
.price{
    padding:8px;
}

.old{
    color:gray;
    text-decoration:line-through;
    font-size:13px;
}

.new{
    color:green;
    font-weight:bold;
    font-size:15px;
}

/* زر */
button{
    width:100%;
    padding:10px;
    background:#111;
    color:white;
    border:0;
}

/* السلة */
.cartBtn{
    background:black;
    padding:6px 12px;
    border-radius:20px;
}

/* السلة */
.cart{
    position:fixed;
    left:-340px;
    top:0;
    width:320px;
    height:100%;
    background:white;
    box-shadow:2px 0 15px rgba(0,0,0,0.2);
    padding:15px;
    transition:0.3s;
    overflow:auto;
}

.cart.open{
    left:0;
}

.item{
    border-bottom:1px solid #eee;
    padding:8px 0;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

.order{
    width:100%;
    padding:12px;
    background:#25D366;
    color:white;
    border:0;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<div>🛍️ STORE</div>
<div class="cartBtn" onclick="toggle()">🛒 <span id="count">0</span></div>
</div>

<div class="grid" id="grid"></div>

<!-- السلة -->
<div class="cart" id="cart">

<h3>🛒 السلة</h3>
<div id="items"></div>

<h3>📦 بيانات الطلب</h3>

<input id="phone" placeholder="📞 رقم التليفون">
<input id="address" placeholder="📍 العنوان / الموقع">

<button class="order" onclick="send()">📲 إرسال الطلب</button>

</div>

<script>

let cart=[];

/* المنتجات + أسعار + خصومات */
let products=[
{
img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/0879101f-bb8a-4f82-a55e-ac3d2f732634.jpeg",
old:1000,
price:800
},
{
img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/340e5cab-4e21-41c9-8c52-d812829ebf2c.jpeg",
old:900,
price:600
},
{
img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/5fa57c2d-52c3-4528-b68f-19456893ded0.jpeg",
old:900,
price:780
},
{
img:"https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/72b7b607-5592-4a6a-9d38-c9445a0dbf43.jpeg",
old:700,
price:500
}
];

function render(){

let html="";

products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<div class="price">
<div class="old">${p.old} جنيه</div>
<div class="new">${p.price} جنيه</div>
</div>
<button onclick="add(${i})">إضافة للسلة</button>
</div>
`;
});

document.getElementById("grid").innerHTML=html;
}

function add(i){
cart.push(products[i]);
document.getElementById("count").innerText=cart.length;
update();
}

function update(){
let html="";
cart.forEach((c,i)=>{
html+=`<div class="item">${i+1}- ${c.price} جنيه</div>`;
});
document.getElementById("items").innerHTML=html;
}

function toggle(){
document.getElementById("cart").classList.toggle("open");
}

function send(){

let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let msg="🛍️ طلب جديد\n\n";
msg+="📞 "+phone+"\n📍 "+address+"\n\n";

cart.forEach((c,i)=>{
msg+=(i+1)+"- "+c.price+" جنيه\n";
});

window.open("https://wa.me/201224537445?text="+encodeURIComponent(msg));
}

render();

</script>

</body>
</html>
