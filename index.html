<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fatma Store</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    margin:0;
    background:#f4f4f4;
}

.header{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    position:relative;
}

.cart{
    position:absolute;
    left:15px;
    top:15px;
    background:red;
    color:white;
    width:25px;
    height:25px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* المنتجات */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    padding:15px;
}

.product{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.price{
    padding:8px;
}

.old{
    text-decoration:line-through;
    color:gray;
    font-size:13px;
}

.new{
    color:green;
    font-size:16px;
    font-weight:bold;
}

button{
    width:100%;
    padding:10px;
    border:0;
    background:#111;
    color:white;
    cursor:pointer;
}

/* زر الطلب */
.orderBtn{
    display:block;
    margin:15px;
    padding:12px;
    background:#25D366;
    color:white;
    text-align:center;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

/* الفورم */
.orderBox{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.orderBox input,
.orderBox textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.orderBox textarea{
    height:80px;
}

.orderBox button{
    background:#25D366;
    font-size:18px;
}
</style>

</head>

<body>

<div class="header">
🛍️ Fatma Store
<div class="cart" id="cartCount">0</div>
</div>

<a class="orderBtn" onclick="sendCartOrder()">
📲 اطلب من السلة
</a>

<!-- المنتجات -->
<div class="products">

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/0879101f-bb8a-4f82-a55e-ac3d2f732634.jpeg">
<div class="price"><div class="old">1000</div><div class="new">800 جنيه</div></div>
<button onclick="add('طقم سرير 1000 → 800')">أضف للسلة</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/340e5cab-4e21-41c9-8c52-d812829ebf2c.jpeg">
<div class="price"><div class="old">800</div><div class="new">650 جنيه</div></div>
<button onclick="add('طقم سرير 800 → 650')">أضف للسلة</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/5fa57c2d-52c3-4528-b68f-19456893ded0.jpeg">
<div class="price"><div class="old">900</div><div class="new">780 جنيه</div></div>
<button onclick="add('طقم سرير 900 → 780')">أضف للسلة</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/72b7b607-5592-4a6a-9d38-c9445a0dbf43.jpeg">
<div class="price"><div class="new">500 جنيه</div></div>
<button onclick="add('منتج 500')">أضف للسلة</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/9214c5b0-4ef3-420b-afcd-add97dab3c98.jpeg">
<div class="price"><div class="new">400 جنيه</div></div>
<button onclick="add('منتج 400')">أضف للسلة</button>
</div>

</div>

<!-- الفورم -->
<div class="orderBox">

<h2>🛍️ طلب جديد</h2>

<input type="text" id="name" placeholder="👤 الاسم">
<input type="text" id="phone" placeholder="📞 الرقم">
<input type="text" id="address" placeholder="📍 العنوان">
<textarea id="product" placeholder="📦 المنتج (اختياري لو من السلة)"></textarea>

<button onclick="sendFormOrder()">
📲 إرسال الطلب
</button>

</div>

<script>

let cart = [];

function add(item){
    cart.push(item);
    document.getElementById("cartCount").innerText = cart.length;
}

/* طلب السلة */
function sendCartOrder(){

    if(cart.length === 0){
        alert("السلة فاضية 🛒");
        return;
    }

    let msg = "🛍️ طلب من السلة%0A%0A";

    cart.forEach((item,i)=>{
        msg += (i+1) + "- " + item + "%0A";
    });

    window.open("https://wa.me/201224537445?text=" + encodeURIComponent(msg));
}

/* طلب الفورم */
function sendFormOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let product = document.getElementById("product").value;

    let msg =
`🛍️ طلب جديد
👤 الاسم: ${name}
📞 الرقم: ${phone}
📍 العنوان: ${address}
📦 المنتج: ${product}`;

    window.open("https://wa.me/201224537445?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
