<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fatma Store</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    margin:0;
    background:#f4f4f4;
}

/* Header */
.header{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    position:relative;
}

.cart-count{
    position:absolute;
    left:15px;
    top:15px;
    background:red;
    color:white;
    width:25px;
    height:25px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
}

/* Order info */
.info{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
}

/* Button */
.btn{
    display:block;
    margin:10px 15px;
    padding:12px;
    text-align:center;
    background:#25D366;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    padding:15px;
}

.product{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.product button{
    width:100%;
    padding:10px;
    border:none;
    background:#111;
    color:white;
    font-size:14px;
    cursor:pointer;
}

.product button:hover{
    background:#333;
}
</style>

</head>

<script>

let cart = [];

function add(item){
    cart.push(item);
    document.getElementById("cartCount").innerText = cart.length;
    alert("تمت الإضافة للسلة 🛒");
}

function sendWhats(){
    let msg = "🛍️ طلب جديد%0A%0A";
    msg += "👤 الاسم: ملك تيمور%0A";
    msg += "📞 الرقم: 01224537445%0A";
    msg += "📍 العنوان: كفر القديم%0A";
    msg += "📦 المنتجات:%0A";

    cart.forEach((item,i)=>{
        msg += (i+1) + "- " + item + "%0A";
    });

    if(cart.length === 0){
        alert("السلة فاضية 🛒");
        return;
    }

    window.open("https://wa.me/201224537445?text=" + msg);
}

</script>
