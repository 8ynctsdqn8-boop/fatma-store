<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاطمة الزهراء للمفروشات</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.header{
background:linear-gradient(135deg,#6A11CB,#2575FC);
color:white;
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
}

.title{
text-align:center;
margin:20px 0 0;
font-size:18px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h2{
margin:10px;
font-size:16px;
}

.price{
color:#E74C3C;
font-weight:bold;
margin:0 10px;
}

.btn{
display:block;
margin:10px;
padding:10px;
background:#25D366;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* الفورم */
#formBox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
}

.form-content{
background:white;
max-width:350px;
margin:80px auto;
padding:20px;
border-radius:10px;
}

.form-content input{
width:100%;
padding:10px;
margin:5px 0;
}

.close-btn{
background:red;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
🛏️ فاطمة الزهراء للمفروشات
</div>

<div class="title">🧺 أطقم ملايات وسراير</div>

<div class="container">

<!-- 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800">
<h2>طقم ملاية قطني</h2>
<p class="price">550 جنيه</p>
<button class="btn" onclick="openForm('طقم ملاية قطني - 550')">اطلب الآن</button>
</div>

<!-- 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1567016432779-094069958ea5?auto=format&fit=crop&w=800">
<h2>طقم ملاية بيج ناعم</h2>
<p class="price">700 جنيه</p>
<button class="btn" onclick="openForm('طقم ملاية بيج - 700')">اطلب الآن</button>
</div>

<!-- 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1505691723518-36a5ac3b2d5a?auto=format&fit=crop&w=800">
<h2>طقم ملاية فاخر</h2>
<p class="price">900 جنيه</p>
<button class="btn" onclick="openForm('طقم فاخر - 900')">اطلب الآن</button>
</div>

<!-- 4 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1582582429416-6a5c7b3c2c8f?auto=format&fit=crop&w=800">
<h2>طقم أطفال ملون</h2>
<p class="price">500 جنيه</p>
<button class="btn" onclick="openForm('طقم أطفال - 500')">اطلب الآن</button>
</div>

<!-- 5 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1616627984385-5f8f7f6a4c8f?auto=format&fit=crop&w=800">
<h2>طقم سرير عرايس أبيض</h2>
<p class="price">850 جنيه</p>
<button class="btn" onclick="openForm('طقم سرير عرايس - 850')">اطلب الآن</button>
</div>

<!-- 6 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=800">
<h2>طقم سرير رمادي شيك</h2>
<p class="price">800 جنيه</p>
<button class="btn" onclick="openForm('طقم سرير رمادي - 800')">اطلب الآن</button>
</div>

<!-- 7 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=800">
<h2>طقم سرير مودرن</h2>
<p class="price">780 جنيه</p>
<button class="btn" onclick="openForm('طقم سرير مودرن - 780')">اطلب الآن</button>
</div>

<!-- 8 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1567016545648-0f8b7c7d1b8c?auto=format&fit=crop&w=800">
<h2>طقم ملاية وردي</h2>
<p class="price">650 جنيه</p>
<button class="btn" onclick="openForm('طقم ملاية وردي - 650')">اطلب الآن</button>
</div>

</div>

<!-- الفورم -->
<div id="formBox">
<div class="form-content">

<h3>🛍️ إتمام الطلب</h3>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">
<input id="address" placeholder="العنوان">

<button class="btn" onclick="sendOrder()">إرسال واتساب</button>
<button class="close-btn" onclick="closeForm()">إغلاق</button>

</div>
</div>

<script>

let selectedProduct = "";

function openForm(product){
selectedProduct = product;
document.getElementById("formBox").style.display="block";
}

function closeForm(){
document.getElementById("formBox").style.display="none";
}

function sendOrder(){
let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

let message =
"🛍️ طلب جديد%0A%0A" +
"👤 الاسم: " + name + "%0A" +
"📞 الرقم: " + phone + "%0A" +
"📍 العنوان: " + address + "%0A" +
"📦 المنتج: " + selectedProduct;

window.open("https://wa.me/201224537445?text=" + message, "_blank");
}

</script>

</body>
</html>
