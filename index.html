<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Fatma Store</title>

<style>
body{
    font-family: Arial;
    direction: rtl;
    margin:0;
    background:#f4f4f4;
}

/* الهيدر */
.header{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    position:relative;
}

.cart{
    position:absolute;
    left:15px;
    top:15px;
    background:red;
    color:white;
    width:28px;
    height:28px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* المنتجات عمودي */
.products{
    display:flex;
    flex-direction:column;
    gap:15px;
    padding:15px;
}

.product{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:250px;
    object-fit:cover;
}

/* السعر */
.price{
    padding:10px;
}

.old{
    text-decoration:line-through;
    color:gray;
}

.new{
    color:green;
    font-weight:bold;
    font-size:18px;
}

/* زر الإضافة */
button{
    width:100%;
    padding:12px;
    border:0;
    background:#111;
    color:white;
    font-size:16px;
    cursor:pointer;
}

/* فورم الطلب */
.form{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

.orderBtn{
    width:100%;
    padding:12px;
    background:#25D366;
    color:white;
    border:0;
    font-size:18px;
    cursor:pointer;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="header">
🛍️ Fatma Store
<div class="cart" id="cartCount">0</div>
</div>

<!-- المنتجات -->

<div class="products">

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/0879101f-bb8a-4f82-a55e-ac3d2f732634.jpeg">
<div class="price">
<div class="old">1000 جنيه</div>
<div class="new">800 جنيه (بينك)</div>
</div>
<button onclick="add('طقم بينك',800)">أضف للسلة</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/340e5cab-4e21-41c9-8c52-d812829ebf2c.jpeg">
<div class="price">
<div class="old">1000 جنيه</div>
<div class="new">750 جنيه (أزرق)</div>
</div>
<button onclick="add('طقم أزرق',750)">أضف للسلة</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/5fa57c2d-52c3-4528-b68f-19456893ded0.jpeg">
<div class="price">
<div class="old">900 جنيه</div>
<div class="new">780 جنيه</div>
</div>
<button onclick="add('طقم مودرن',780)">أضف للسلة</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/8ynctsdqn8-boop/fatma-store/main/72b7b607-5592-4a6a-9d38-c9445a0dbf43.jpeg">
<div class="price">
<div class="old">600 جنيه</div>
<div class="new">500 جنيه</div>
</div>
<button onclick="add('منتج 500',500)">أضف للسلة</button>
</div>

</div>

<!-- فورم الطلب -->

<div class="form">

<h3>🛍️ طلب جديد</h3>

<input type="text" id="name" placeholder="👤 الاسم">
<input type="text" id="phone" placeholder="📞 الرقم">
<input type="text" id="address" placeholder="📍 العنوان">
<textarea id="note" placeholder="📦 ملاحظات (اختياري)"></textarea>

<button class="orderBtn" onclick="sendOrder()">
📲 اطلب الأوردر
</button>

</div>

<script>

let cart = [];

function add(name, price){
    cart.push({name, price});
    document.getElementById("cartCount").innerText = cart.length;
    alert("تمت الإضافة للسلة 🛒");
}

function sendOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let note = document.getElementById("note").value;

    if(cart.length === 0){
        alert("السلة فاضية 🛒");
        return;
    }

    let msg = "🛍️ طلب جديد%0A%0A";

    msg += "👤 الاسم: " + name + "%0A";
    msg += "📞 الرقم: " + phone + "%0A";
    msg += "📍 العنوان: " + address + "%0A%0A";

    msg += "📦 المنتجات:%0A";

    cart.forEach((item,i)=>{
        msg += (i+1) + "- " + item.name + " - " + item.price + " جنيه%0A";
    });

    msg += "%0A📝 ملاحظات: " + note;

    window.open("https://wa.me/201224537445?text=" + msg);
}

</script>

</body>
</html>
