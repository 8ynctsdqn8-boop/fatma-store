<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاطمة الزهراء للمفروشات</title>

<style>
body{
font-family: Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
padding:25px;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:15px;
margin:15px 0;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.price{
color:#e74c3c;
font-size:20px;
font-weight:bold;
margin:10px 0;
}

a{
display:block;
background:linear-gradient(135deg,#25D366,#128C7E);
color:white;
text-align:center;
padding:12px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>🛏️ فاطمة الزهراء للمفروشات</h1>
<p>أجمل مفروشات بجودة عالية وأسعار مناسبة 💙</p>
</div>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7">
<h2>مفرش قطني كينج فاخر</h2>
<p class="price">499 جنيه</p>
<a href="https://wa.me/201224537445" target="_blank">اطلب على واتساب 💬</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<h2>مفرش حرير كوين فاخر</h2>
<p class="price">799 جنيه</p>
<a href="https://wa.me/201224537445" target="_blank">اطلب على واتساب 💬</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1612872087724-bb876a7513e1">
<h2>مفرش مطبوع مزدوج</h2>
<p class="price">349 جنيه</p>
<a href="https://wa.me/201224537445" target="_blank">اطلب على واتساب 💬</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1574169208507-84376144848b">
<h2>مفرش بامبو عضوي</h2>
<p class="price">299 جنيه</p>
<a href="https://wa.me/201224537445" target="_blank">اطلب على واتساب 💬</a>
</div>

</div>

</body>
</html>
