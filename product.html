
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Product</title>

<style>
body{margin:0;font-family:Arial;direction:rtl;}
img{width:100%;height:350px;object-fit:cover;}
.container{padding:15px;}
.old{text-decoration:line-through;color:gray;}
.new{color:#e60023;font-size:22px;font-weight:bold;}
button{width:100%;padding:12px;background:black;color:white;border:0;}
</style>
</head>

<body>

<img id="img">

<div class="container">
<h2 id="name"></h2>
<div class="old" id="old"></div>
<div class="new" id="price"></div>

<button onclick="add()">أضف للسلة</button>
</div>

<script>

let products=JSON.parse(localStorage.getItem("products"));
let params=new URLSearchParams(window.location.search);
let id=params.get("id");

let product=products.find(p=>p.id==id);

document.getElementById("img").src=product.img;
document.getElementById("name").innerText=product.name;
document.getElementById("old").innerText=product.old+" جنيه";
document.getElementById("price").innerText=product.price+" جنيه";

function add(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
cart.push(product.id);
localStorage.setItem("cart",JSON.stringify(cart));
alert("تمت الإضافة للسلة");
}

</script>

</body>
</html>
