<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
body{font-family:Arial;direction:rtl;padding:15px}
.item{border-bottom:1px solid #eee;padding:10px 0}
button{width:100%;padding:12px;background:#25D366;color:white;border:0}
</style>
</head>

<body>

<h2>🛒 السلة</h2>

<div id="items"></div>

<button onclick="order()">📲 اطلب الآن</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html="";

cart.forEach((item,i)=>{
html+=`<div class="item">${i+1}- منتج</div>`;
});

document.getElementById("items").innerHTML=html;

function order(){
alert("تم إرسال الطلب ✔");
}

</script>

</body>
</html>
