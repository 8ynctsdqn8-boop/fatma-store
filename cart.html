<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
body{font-family:Arial;direction:rtl;padding:15px;background:#f5f5f5}
.item{background:white;margin-bottom:10px;padding:10px;border-radius:8px}
button{width:100%;padding:12px;background:#25D366;color:white;border:0}
.total{font-weight:bold;margin:10px 0}
</style>
</head>

<body>

<h2>🛒 السلة</h2>

<div id="items"></div>

<div class="total">الإجمالي: <span id="total">0</span></div>

<button onclick="order()">📲 اطلب الآن</button>

<script>

let products = {
1:{name:"طقم سرير",price:800},
2:{name:"ملاية شيك",price:600}
};

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html = "";
let total = 0;

cart.forEach((id,i)=>{
let p = products[id];
if(p){
html += `<div class="item">${i+1}- ${p.name} - ${p.price} جنيه</div>`;
total += p.price;
}
});

document.getElementById("items").innerHTML = html;
document.getElementById("total").innerText = total;

function order(){
let msg = "🛍️ طلب جديد\n\n";

cart.forEach((id,i)=>{
let p = products[id];
msg += `${i+1}- ${p.name} - ${p.price}\n`;
});

msg += `\n💰 الإجمالي: ${total}`;

window.open("https://wa.me/201224537445?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
